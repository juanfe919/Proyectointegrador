<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carvajal S.A. — Historia Empresarial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- ══════════════════════════════════════════
       FASE 1: PANTALLA DE LOGIN
  ══════════════════════════════════════════ -->
  <section id="loginScreen" class="screen active">
    <div class="login-bg-pattern"></div>
    <div class="login-card">
      <div class="login-logo-wrap">
        <div class="login-logo-circle">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="52" height="52" rx="14" fill="#00488e"/>
            <path d="M10 26C10 17.163 17.163 10 26 10C31.37 10 36.09 12.66 39.04 16.72L34.2 19.86C32.34 17.38 29.36 15.8 26 15.8C20.37 15.8 15.8 20.37 15.8 26C15.8 31.63 20.37 36.2 26 36.2C29.36 36.2 32.34 34.62 34.2 32.14L39.04 35.28C36.09 39.34 31.37 42 26 42C17.163 42 10 34.837 10 26Z" fill="white"/>
            <path d="M30 22H42V26H30V22Z" fill="#FF6B00"/>
            <path d="M30 26H42V30H30V26Z" fill="white" opacity="0.5"/>
          </svg>
        </div>
        <span class="login-brand">CARVAJAL</span>
      </div>
 
      <div class="login-divider"></div>
 
      <p class="login-subtitle">Portal practicantes · Historia Empresarial</p>
      <h1 class="login-title">Bienvenido al<br /><span>Recorrido</span></h1>
 
      <form id="loginForm" autocomplete="off" onsubmit="return false;">
        <div class="field-group">
          <label for="inputUsuario">Usuario</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <input type="text" id="inputUsuario" placeholder="Tu usuario corporativo" />
          </div>
        </div>
        <div class="field-group">
          <label for="inputPassword">Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
            <input type="password" id="inputPassword" placeholder="••••••••" />
          </div>
        </div>
        <div id="loginError" class="login-error" aria-live="polite"></div>
        <button type="button" id="btnLogin" class="btn-primary">
          <span>Ingresar</span>
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
      </form>
 
      <p class="login-footer">© 2026 Carvajal S.A. · Actividad académica</p>
    </div>
  </section>
 
  <!-- ══════════════════════════════════════════
       FASE 2 + 3: PANTALLA DE PERFIL Y MAPA
  ══════════════════════════════════════════ -->
  <section id="profileScreen" class="screen">
 
    <!-- Header corporativo -->
    <header class="corp-header">
      <div class="corp-header-inner">
        <div class="corp-logo">
          <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
            <rect width="52" height="52" rx="10" fill="#00488e"/>
            <path d="M10 26C10 17.163 17.163 10 26 10C31.37 10 36.09 12.66 39.04 16.72L34.2 19.86C32.34 17.38 29.36 15.8 26 15.8C20.37 15.8 15.8 20.37 15.8 26C15.8 31.63 20.37 36.2 26 36.2C29.36 36.2 32.34 34.62 34.2 32.14L39.04 35.28C36.09 39.34 31.37 42 26 42C17.163 42 10 34.837 10 26Z" fill="white"/>
            <path d="M30 22H42V26H30V22Z" fill="#FF6B00"/>
          </svg>
          <span>CARVAJAL</span>
        </div>
        <div class="corp-badge">Historia Empresarial</div>
        <button id="btnLogout" class="btn-logout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
    </header>
 
    <main class="app-main">
 
      <!-- Tarjeta de perfil -->
      <div class="profile-card fade-in-up" id="profileCard">
        <div class="profile-photo-ring">
          <img id="profilePhoto" src="" alt="Foto de perfil" />
        </div>
        <h2 id="profileName" class="profile-name"></h2>
        <p id="profileDays" class="profile-days"></p>
        <div class="typewriter-wrap">
          <p id="typewriterText" class="typewriter-text"></p>
          <span class="typewriter-cursor">|</span>
        </div>
      </div>
 
      <!-- Mapa de ruta -->
      <div class="roadmap-section fade-in-up delay-2">
        <h3 class="roadmap-title">
          <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
          Tu Camino por Carvajal S.A
        </h3>
        <p class="roadmap-subtitle">Completa cada parada para avanzar en la actividad</p>
        <div class="roadmap-container" id="roadmapContainer"></div>
      </div>
 
    </main>
 
    <footer class="app-footer">
      <p>© 2026 Carvajal S.A. · Todos los derechos reservados</p>
    </footer>
  </section>
 
  <script src="script.js"></script>
</body>
</html>
